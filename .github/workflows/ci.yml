name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Run GitVersion
        id: gitversion
        run: |
          VERSION=$(dotnet gitversion /showvariable SemVer)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.gitversion.outputs.version }}

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/ZeroAlloc.Pipeline/ZeroAlloc.Pipeline.csproj --no-build -c Release -p:PackageVersion=${{ steps.gitversion.outputs.version }} -o ./artifacts
          dotnet pack src/ZeroAlloc.Pipeline.Generators/ZeroAlloc.Pipeline.Generators.csproj --no-build -c Release -p:PackageVersion=${{ steps.gitversion.outputs.version }} -o ./artifacts

      - name: Push to NuGet (pre-release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  aot-smoke:
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.Pipeline.AotSmoke. The contract lib is consumed by
    # downstream source-gens (Mediator, Notify, etc.); their samples exercise the
    # full generated pipeline. This sample guards the contract assembly itself —
    # the attribute + interface must publish cleanly under AOT on their own.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.Pipeline.AotSmoke/ZeroAlloc.Pipeline.AotSmoke.csproj

      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.Pipeline.AotSmoke/ZeroAlloc.Pipeline.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.Pipeline.AotSmoke

  api-compat:
    uses: ZeroAlloc-Net/.github/.github/workflows/api-compat.yml@main
    with:
      package-id: ZeroAlloc.Pipeline
      csproj-path: src/ZeroAlloc.Pipeline/ZeroAlloc.Pipeline.csproj
